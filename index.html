<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Form Manager Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --accent: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            padding: 2rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 3rem;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #c084fc);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .form-info {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 1rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .controls {
            display: flex;
            gap: 1rem;
        }

        button {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        .btn-outline:hover {
            background: var(--border);
        }

        .question-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: border-color 0.2s;
        }

        .question-card:hover {
            border-color: var(--primary);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .question-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-main);
            max-width: 80%;
        }

        .question-type {
            font-size: 0.8rem;
            padding: 0.25rem 0.5rem;
            background: var(--bg);
            border-radius: 0.25rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .entry-item {
            background: rgba(15, 23, 42, 0.5);
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 0.75rem;
            border-left: 4px solid var(--primary);
        }

        .entry-id {
            font-family: monospace;
            color: var(--accent);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .options-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .option-tag {
            font-size: 0.85rem;
            padding: 0.2rem 0.6rem;
            background: var(--border);
            border-radius: 1rem;
            color: var(--text-main);
        }

        .loading {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        /* Glassmorphism effect */
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* Settings Bar */
        .settings-bar {
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            gap: 2rem;
            align-items: flex-end; /* Alinhar botões na base do campo de texto */
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .setting-field {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            flex-grow: 1;
        }

        .setting-field label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        .setting-field input, .setting-field textarea {
            background: var(--bg);
            border: 1px solid var(--border);
            color: white;
            padding: 0.5rem;
            border-radius: 0.4rem;
            font-size: 0.9rem;
        }

        /* Loading Overlay */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid var(--border);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-text" style="font-weight: 600; font-size: 1.2rem;">IA analisando questões...</p>
        <p class="subtitle">Isso pode levar alguns segundos dependendo da complexidade.</p>
    </div>

    <div class="settings-bar glass">
        <div class="setting-field" style="max-width: 300px;">
            <label>Cloudflare Worker URL</label>
            <input type="text" id="worker-url" placeholder="https://seu-worker.workers.dev" onchange="saveSettings()">
        </div>
        <div class="setting-field">
            <label>👤 Perfil da Persona (Ajudante Geral até Eng. Civil)</label>
            <textarea id="persona-text" placeholder="Descreva o comportamento da IA..." rows="4" onchange="saveSettings()"></textarea>
        </div>
        <button class="btn-primary" style="background: #10b981; white-space: nowrap; height: 3.5rem;" onclick="gerarPersonaIA()">🎲 Gerar Persona</button>
    </div>

    <div class="container">
        <header>
            <h1>Form Manager Pro <span style="font-size: 0.8rem; vertical-align: middle; opacity: 0.5;">v2.2 (IA Turbo)</span></h1>
            <p class="subtitle">Visualização e Automação de Google Forms</p>
        </header>

        <div class="form-info glass">
            <div>
                <p style="font-weight: 600;">Status da Extração</p>
                <div style="display: flex; gap: 1rem; align-items: center; margin-top: 0.5rem;">
                    <p class="subtitle" id="stats" style="margin: 0;">Carregando dados...</p>
                    <select id="profile-selector" class="btn-outline" style="padding: 0.4rem; height: auto; font-size: 0.85rem;">
                        <option value="enthusiast">🌟 Perfil: Entusiasta (Satisfeito)</option>
                        <option value="neutral" selected>⚖️ Perfil: Neutro (Equilibrado)</option>
                        <option value="critic">💢 Perfil: Crítico (Descontente)</option>
                    </select>
                </div>
            </div>
            <div class="controls">
                <button class="btn-outline" onclick="window.location.reload()">Resetar</button>
                <div style="display: flex; gap: 0.5rem;">
                    <button class="btn-primary" style="background: #8b5cf6;" onclick="gerarRespostas()">🎰 Rnd</button>
                    <button class="btn-primary" style="background: #6366f1;" onclick="gerarRespostasIA()">🤖 Gerar com IA</button>
                </div>
                <button class="btn-primary" style="background: #f59e0b;" id="btn-review" onclick="revisarNoGoogle()" disabled>🔍 Revisar no Google</button>
                <button class="btn-primary" id="btn-send" onclick="enviarParaGoogle()" style="display: none;" disabled>🚀 Enviar Agora</button>
            </div>
        </div>

        <div id="questions-list">
            <div class="loading">Carregando estrutura do formulário...</div>
        </div>
    </div>

    <script>
        let currentFormData = [];

        async function loadFormData() {
            loadSettings();
            try {
                const response = await fetch('form_data_cleaned.json');
                const rawText = await response.text();
                const jsonStart = rawText.indexOf('[');
                const jsonText = rawText.substring(jsonStart);
                const data = JSON.parse(jsonText);
                currentFormData = data;

                renderQuestions(data);
                updateStats(data);
            } catch (error) {
                console.error('Erro ao carregar dados:', error);
                document.getElementById('questions-list').innerHTML = `
                    <div class="loading" style="color: #ef4444;">
                        Erro ao carregar dados. Certifique-se de que o arquivo 'form_data_cleaned.json' existe.
                    </div>
                `;
            }
        }

        function getTypeName(type) {
            const types = {
                2: 'Múltipla Escolha',
                7: 'Escala Linear',
                8: 'Seção / Título',
                9: 'Grade'
            };
            return types[type] || `Tipo ${type}`;
        }

        function renderQuestions(data) {
            const list = document.getElementById('questions-list');
            list.innerHTML = '';

            data.forEach(q => {
                if (q.tipo === 8 && q.entradas.length === 0) {
                    const section = document.createElement('div');
                    section.innerHTML = `<h2 style="margin: 2rem 0 1rem 0; color: var(--primary); border-bottom: 2px solid var(--border); padding-bottom: 0.5rem;">${q.titulo}</h2>`;
                    list.appendChild(section);
                    return;
                }

                const card = document.createElement('div');
                card.className = 'question-card glass';

                let entriesHtml = q.entradas.map(e => `
                    <div class="entry-item">
                        <span class="entry-id">entry.${e.entryId}</span>
                        <p style="font-size: 0.95rem; font-weight: 500;">${e.subTitulo || 'Resposta Principal'}</p>
                        <div class="options-list">
                            ${e.alternativas.map(a => `<span class="option-tag">${a}</span>`).join('')}
                        </div>
                    </div>
                `).join('');

                card.innerHTML = `
                    <div class="question-header">
                        <div class="question-title">${q.titulo}</div>
                        <span class="question-type">${getTypeName(q.tipo)}</span>
                    </div>
                    <div class="question-content">
                        ${entriesHtml}
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function updateStats(data) {
            const totalQuestions = data.filter(q => q.entradas.length > 0).length;
            const totalEntries = data.reduce((acc, q) => acc + q.entradas.length, 0);
            document.getElementById('stats').textContent = `${totalQuestions} perguntas encontradas | ${totalEntries} campos de entrada identificados`;
        }

        let chosenData = {};

        const fixedConstraints = {
            "597118511": ["Masculino", "Feminino"],
            "1551581666": ["18-25", "26-35", "36-45"],
            "838409150": [
                "Graduação Licenciatura | Bacharel", 
                "Pós-graduação | Especialização", 
                "Mestrado | Doutoramento"
            ],
            "1238416916": ["1 - 3 anos", "4 - 6 anos", "> 6 anos"],
            "1526877193": [
                "10 a 49 (Pequena-média)", 
                "50 a 249 (Organização Média)", 
                "250 ou mais (Empresa de grande-porte)"
            ]
        };

        function gerarRespostas() {
            if (!currentFormData.length) return alert('Dados não carregados!');
            const profile = document.getElementById('profile-selector').value;
            const sentimentMap = {
                high: ['sempre', 'sim', 'concordo', 'totalmente', 'muito', 'frequentemente', 'excelente', 'bom', 'satisfeito'],
                low: ['nunca', 'não', 'discordo', 'insatisfeito', 'ruim', 'raramente', 'pouco']
            };
            const normalizeText = (text) => text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();

            currentFormData.forEach(q => {
                q.entradas.forEach(e => {
                    let valor;
                    if (e.entryId === 1689161648) {
                        valor = "Aceito participar";
                    } else {
                        const options = e.alternativas;
                        let filteredOptions = [...options];
                        if (fixedConstraints[e.entryId]) {
                            const allowed = fixedConstraints[e.entryId];
                            filteredOptions = options.filter(opt => allowed.includes(opt));
                            if (filteredOptions.length === 0) filteredOptions = [...options];
                        }
                        const total = filteredOptions.length;
                        let index = -1;
                        const listWithNormalized = filteredOptions.map((opt, i) => ({ text: normalizeText(opt), index: i }));
                        if (profile === 'enthusiast') {
                            const matches = listWithNormalized.filter(item => sentimentMap.high.some(key => item.text.includes(key)));
                            if (matches.length > 0) index = matches[Math.floor(Math.random() * matches.length)].index;
                        } else if (profile === 'critic') {
                            const matches = listWithNormalized.filter(item => sentimentMap.low.some(key => item.text.includes(key)));
                            if (matches.length > 0) index = matches[Math.floor(Math.random() * matches.length)].index;
                        }
                        if (index === -1) {
                            const rand = Math.random();
                            if (profile === 'enthusiast') {
                                if (rand < 0.7) index = Math.floor(total * 0.8 + Math.random() * (total * 0.2)); 
                                else index = Math.floor(Math.random() * total);
                            } else if (profile === 'critic') {
                                if (rand < 0.7) index = Math.floor(Math.random() * (total * 0.3));
                                else index = Math.floor(Math.random() * total);
                            } else {
                                index = Math.floor(Math.random() * total);
                            }
                        }
                        index = Math.max(0, Math.min(total - 1, index));
                        valor = filteredOptions[index];
                    }
                    chosenData[`entry.${e.entryId}`] = valor;
                    updateUISelection(e.entryId, valor);
                });
            });
            document.getElementById('stats').textContent = '✨ Respostas geradas!';
            document.getElementById('btn-review').disabled = false;
            document.getElementById('btn-send').disabled = false;
        }

        function updateUISelection(entryId, valor) {
            document.querySelectorAll('.entry-item').forEach(item => {
                if (item.querySelector('.entry-id').textContent === `entry.${entryId}`) {
                    item.querySelectorAll('.option-tag').forEach(tag => {
                        if (tag.textContent === valor) {
                            tag.style.background = 'var(--accent)';
                            tag.style.color = 'white';
                            tag.style.opacity = '1';
                        } else {
                            tag.style.background = 'var(--border)';
                            tag.style.opacity = '0.3';
                        }
                    });
                }
            });
        }

        function revisarNoGoogle() {
            const baseUrl = "https://docs.google.com/forms/d/e/1FAIpQLSe4Nud-H974E-T2vSCqERbqHzWx96Jyz-JbiJPNvmYCFm4UAQ/viewform";
            const params = new URLSearchParams();
            for (let key in chosenData) params.append(key, chosenData[key]);
            window.open(`${baseUrl}?${params.toString()}`, '_blank');
        }

        async function enviarParaGoogle() {
            const btn = document.getElementById('btn-send');
            try {
                btn.disabled = true;
                btn.textContent = '⏳ Enviando...';
                const url = "https://docs.google.com/forms/d/e/1FAIpQLSe4Nud-H974E-T2vSCqERbqHzWx96Jyz-JbiJPNvmYCFm4UAQ/formResponse";
                const params = new URLSearchParams();
                for (let key in chosenData) params.append(key, chosenData[key]);
                await fetch(url, { method: 'POST', mode: 'no-cors', body: params });
                document.getElementById('stats').innerHTML = '<span style="color: var(--accent);">🏆 SUCESSO!</span>';
                btn.textContent = '✓ Enviado';
            } catch (error) {
                btn.textContent = 'Erro!';
            }
        }

        function saveSettings() {
            localStorage.setItem('form_worker_url', document.getElementById('worker-url').value);
            localStorage.setItem('form_persona_text', document.getElementById('persona-text').value);
        }

        function loadSettings() {
            document.getElementById('worker-url').value = localStorage.getItem('form_worker_url') || '';
            document.getElementById('persona-text').value = localStorage.getItem('form_persona_text') || '';
        }

        function showLoading(text) {
            document.getElementById('loading-text').textContent = text;
            document.getElementById('loading-overlay').style.display = 'flex';
        }

        function hideLoading() {
            document.getElementById('loading-overlay').style.display = 'none';
        }

        async function gerarPersonaIA() {
            let url = document.getElementById('worker-url').value.trim();
            if (!url) return alert('Configure a URL do Worker!');
            
            // Garantir que a URL tem protocolo
            if (!url.startsWith('http')) url = 'https://' + url;
            
            const profile = document.getElementById('profile-selector').options[document.getElementById('profile-selector').selectedIndex].text;
            showLoading('IA construindo persona...');
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        type: "generate_persona",
                        persona: "Gere uma descrição de um trabalhador da construção civil.",
                        profile: profile 
                    })
                });
                const result = await response.json();
                if (result.persona) {
                    // Se a IA incluiu o cargo, adicionamos no topo da descrição
                    const header = result.cargo ? `[${result.cargo}] ` : "";
                    document.getElementById('persona-text').value = header + result.persona;
                    saveSettings();
                }
            } catch (e) {
                alert('Erro ao gerar persona. Verifique a URL do Worker.');
            }
            hideLoading();
        }

        async function gerarRespostasIA() {
            let url = document.getElementById('worker-url').value.trim();
            if (!url) return alert('Configure a URL do Worker!');
            if (!url.startsWith('http')) url = 'https://' + url;
            
            const persona = document.getElementById('persona-text').value || "Engenheiro Civil padrão.";
            const profile = document.getElementById('profile-selector').options[document.getElementById('profile-selector').selectedIndex].text;
            
            // 1. Identificar quais IDs ainda estão faltando
            const requiredEntryIds = [];
            currentFormData.forEach(q => q.entradas.forEach(e => requiredEntryIds.push(e.entryId.toString())));
            
            const missingIds = requiredEntryIds.filter(id => !chosenData[`entry.${id}`]);
            
            if (missingIds.length === 0 && Object.keys(chosenData).length > 0) {
                if (!confirm("Todas as perguntas já estão preenchidas. Deseja gerar tudo novamente?")) return;
                chosenData = {};
            }

            showLoading(`IA analisando ${missingIds.length || requiredEntryIds.length} questões restantes...`);

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        persona, 
                        profile,
                        missingIds: missingIds.length > 0 ? missingIds : null 
                    })
                });
                
                const rawText = await response.text();
                
                function repairJson(text) {
                    let cleaned = text.replace(/```json/g, "").replace(/```/g, "").trim();
                    const start = cleaned.indexOf('{');
                    if (start === -1) return "{}";
                    let json = cleaned.substring(start);
                    let braces = 0;
                    let lastValidComma = -1;
                    for (let i = 0; i < json.length; i++) {
                        if (json[i] === '{') braces++;
                        if (json[i] === '}') braces--;
                        if (json[i] === ',' && braces === 1) lastValidComma = i;
                    }
                    if (braces > 0) {
                        if (lastValidComma !== -1) json = json.substring(0, lastValidComma) + "}";
                        else json += "}";
                    }
                    return json;
                }

                let result;
                let isTruncated = false;
                try {
                    const repaired = repairJson(rawText);
                    result = JSON.parse(repaired);
                    if (rawText.includes(',') && !rawText.trim().endsWith('}')) isTruncated = true;
                } catch (e) {
                    console.error("Erro no Parse:", e);
                    throw new Error("JSON Inválido recebido da IA");
                }

                // 2. Mesclar novos resultados no chosenData
                for (let entryId in result) {
                    let index = result[entryId];
                    
                    // FORÇAR VALORES FIXOS (Gênero e Consentimento)
                    if (entryId.toString() === "1689161648" || entryId.toString() === "597118511") {
                        index = 0;
                    }

                    currentFormData.forEach(q => {
                        q.entradas.forEach(e => {
                            if (e.entryId.toString() === entryId.toString()) {
                                const alternatives = e.alternativas;
                                const safeIndex = Math.max(0, Math.min(alternatives.length - 1, index));
                                const valor = alternatives[safeIndex];
                                chosenData[`entry.${e.entryId}`] = valor;
                                updateUISelection(e.entryId, valor);
                            }
                        });
                    });
                }

                // 3. Recalcular cobertura
                let totalAnswered = 0;
                requiredEntryIds.forEach(id => {
                    if (chosenData[`entry.${id}`]) totalAnswered++;
                });

                const coverage = Math.round((totalAnswered / requiredEntryIds.length) * 100);
                if (coverage < 100) {
                    document.getElementById('stats').innerHTML = `⚠️ <span style="color: #f59e0b;">Progresso: ${coverage}% (${totalAnswered}/${requiredEntryIds.length})</span>. Clique novamente para gerar o restante!`;
                } else {
                    document.getElementById('stats').innerHTML = `✨ <span style="color: var(--accent);">100% Coberto!</span> Pronto para revisão.`;
                }
                
                document.getElementById('btn-review').disabled = false;
                document.getElementById('btn-send').disabled = false;
            } catch (error) {
                console.error(error);
                alert('Erro na geração IA: ' + error.message);
            }
            hideLoading();
        }

        loadFormData();
    </script>
</body>
</html>
