<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Form Manager Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --accent: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            padding: 2rem;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        header { margin-bottom: 3rem; text-align: center; }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #c084fc);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle { color: var(--text-muted); font-size: 1.1rem; }

        .form-info {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 1rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .controls { display: flex; gap: 1rem; }

        button {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn-outline:hover { background: var(--border); }

        .question-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .question-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
        .question-title { font-size: 1.1rem; font-weight: 700; color: #818cf8; max-width: 90%; }
        
        .entry-item {
            background: rgba(15, 23, 42, 0.4);
            padding: 1.25rem;
            border-radius: 0.75rem;
            margin-top: 1rem;
            border-left: 4px solid var(--primary);
            transition: all 0.2s;
        }
        .entry-item:hover { background: rgba(15, 23, 42, 0.6); }

        .entry-id { font-family: monospace; color: var(--text-muted); font-size: 0.75rem; margin-bottom: 0.4rem; display: block; opacity: 0.5; }

        .pergunta-text { font-size: 1rem; font-weight: 500; color: var(--text-main); margin-bottom: 0.75rem; display: block; }

        .options-list { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
        .option-tag { font-size: 0.85rem; padding: 0.35rem 0.75rem; background: var(--border); border-radius: 0.5rem; color: var(--text-main); cursor: pointer; transition: all 0.2s; }
        .option-tag:hover { background: var(--primary); transform: scale(1.05); }

        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }

        .settings-bar {
            background: rgba(15, 23, 42, 0.9);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            gap: 2rem;
            align-items: flex-end; 
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .setting-field { display: flex; flex-direction: column; gap: 0.25rem; flex-grow: 1; }
        .setting-field label { font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); }
        .setting-field input, .setting-field textarea {
            background: var(--bg); border: 1px solid var(--border); color: white; padding: 0.6rem; border-radius: 0.5rem; font-size: 0.9rem;
        }

        #loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 1rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-text" style="font-weight: 600;">IA Gerando Persona...</p>
    </div>

    <div class="settings-bar glass">
        <div class="setting-field" style="max-width: 300px;">
            <label>Worker URL</label>
            <input type="text" id="worker-url" onchange="saveSettings()">
        </div>
        <div class="setting-field">
            <label>👤 Persona Gerada</label>
            <textarea id="persona-text" placeholder="Gere uma persona..." rows="3" readonly></textarea>
        </div>
        <button class="btn-primary" style="background: #10b981; height: 3.5rem; align-self: flex-end;" onclick="gerarPersonaIA()">🎲 Gerar Persona</button>
    </div>

    <div class="container">
        <header>
            <h1>Manager Pro <span style="font-size: 0.8rem; opacity: 0.6;">v3.9 (Logic Consistency)</span></h1>
            <p class="subtitle">Ajuste manual e controle de correlação lógica</p>
        </header>

        <div class="form-info glass">
            <div style="flex-grow: 1;">
                <p style="font-weight: 600; font-size: 0.9rem;">CONFIGURAÇÃO DE RESPOSTA</p>
                <div style="display: flex; gap: 1rem; align-items: center; margin-top: 0.5rem;">
                    <select id="profile-selector" class="btn-outline" style="padding: 0.5rem; border-radius: 0.5rem;">
                        <option value="enthusiast">🌟 Entusiasta (Satisfeito)</option>
                        <option value="neutral" selected>⚖️ Neutro (Equilibrado)</option>
                        <option value="critic">💢 Crítico (Descontente)</option>
                    </select>
                    <p class="subtitle" id="stats" style="margin: 0; font-size: 0.9rem;"></p>
                </div>
            </div>
            <div class="controls">
                <button class="btn-primary" id="btn-fill" onclick="preencherComLogica()" disabled>🤖 Preencher Tudo</button>
                <button class="btn-primary" style="background: #f59e0b;" id="btn-review" onclick="revisarNoGoogle()" disabled>🔍 Ver no Google Forms</button>
            </div>
        </div>

        <div id="questions-list"></div>
    </div>

    <script>
        let currentFormData = [];
        let currentPersona = null;
        let chosenData = {};

        // Mapeamento de Clusters para Consistência
        const CLUSTERS = {
            // Liderança Positiva (Desejável)
            positiveLeadership: {
                ids: ["1976545310", "1244948973", "757708849", "823250471", "1410376908", "420935355", "865380645", "2115769679", "972488808", "591415489", "700788971", "1347386594", "1967752519", "932249426", "1280716648", "1733001206", "1257184161", "1644236510", "369447144", "541274787", "841527531", "1587361403", "872717294", "2061876680", "1691150244", "2003430920", "698444589", "1341442619", "341562263", "1364686846"],
                weight: 1.0
            },
            // Liderança Autoritária (Normalmente Inverso da satisfação/liderança positiva)
            authoritarianLeadership: {
                ids: ["1481425776", "866315424", "1691926923", "1008709823", "2107463470", "447695859", "965032164", "1397831989", "551740613"],
                weight: -0.8 // Inverso
            },
            // Bem-estar e Felicidade
            wellbeing: {
                ids: ["1781156309", "747389213", "129959955", "1064242087", "1006169780", "1350592002", "1117408967", "687690664", "1986616754", "987353279", "2046985589", "1634913014", "575207883", "1690387302", "1821940231", "982821141", "1478214665", "1877836579"],
                weight: 1.0
            },
            // Sentimentos Negativos (Inverso do bem-estar)
            negativeEmotions: {
                ids: ["428843224", "125290073", "1597974086", "282059358"],
                weight: -0.9 // Fortemente Inverso
            },
            // Inovação e Proatividade
            innovation: {
                ids: ["2067981114", "1743965985", "336636506", "360127663", "358850342", "759080217", "470208321", "847943349", "667443043", "1060877777", "674859746", "565970282", "1083840627", "1886116540", "2126467353", "325232157", "853857315"],
                weight: 1.0
            }
        };

        const REVERSE_CODED = ["153634840"];

        const normalizeText = (text) => text ? text.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim() : "";

        async function loadFormData() {
            loadSettings();
            try {
                const response = await fetch('form_data_cleaned.json');
                const data = await response.json();
                currentFormData = data;
                renderQuestions(data);
                document.getElementById('stats').textContent = `${data.length} blocos carregados.`;
            } catch (e) { console.error(e); }
        }

        function renderQuestions(data) {
            const list = document.getElementById('questions-list');
            list.innerHTML = '';
            data.forEach(q => {
                const card = document.createElement('div');
                card.className = 'question-card glass';
                let entriesHtml = q.entradas.map(e => `
                    <div class="entry-item">
                        <span class="entry-id">ID: ${e.entryId}</span>
                        <span class="pergunta-text">${e.subTitulo}</span>
                        <div class="options-list">${e.alternativas.map(a => `<span class="option-tag" data-id="${e.entryId}" onclick="manualmenteSetarResposta('${e.entryId}', '${a.replace(/'/g, "\\'")}')">${a}</span>`).join('')}</div>
                    </div>
                `).join('');
                card.innerHTML = `<div class="question-header"><div class="question-title">${q.titulo}</div></div><div class="question-content">${entriesHtml}</div>`;
                list.appendChild(card);
            });
        }

        async function gerarPersonaIA() {
            let url = document.getElementById('worker-url').value.trim();
            if (!url) url = 'googleformsrespode.lucasmaia2709.workers.dev';
            if (!url.startsWith('http')) url = 'https://' + url;
            const profile = document.getElementById('profile-selector').value;
            showLoading('Criando Persona...');
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ profile, seed: Math.random() + Date.now() })
                });
                const result = await response.json();
                if (result.error) throw new Error(result.error);
                currentPersona = result;
                document.getElementById('persona-text').value = `CARGO: ${result.cargo} | IDADE: ${result.idade}\n${result.persona}`;
                document.getElementById('btn-fill').disabled = false;
                saveSettings();
            } catch (e) { alert('Erro: ' + e.message); }
            hideLoading();
        }

        function preencherComLogica() {
            if (!currentPersona) return;
            const profile = document.getElementById('profile-selector').value;
            const sentimentMap = {
                enthusiast: { base: 4.6, std: 0.35, floor: 0.7 },
                neutral: { base: 3.0, std: 0.8, floor: 0.3 },
                critic: { base: 1.4, std: 0.35, floor: 0.1 }
            }[profile];

            // Define sentimentos base por cluster para manter consistência
            const clusterSentiments = {};
            Object.keys(CLUSTERS).forEach(key => {
                clusterSentiments[key] = sentimentMap.base + (gauss() * 0.2); // Jitter leve na base do cluster
            });

            currentFormData.forEach(section => {
                section.entradas.forEach(e => {
                    const idStr = e.entryId.toString();
                    let valor;

                    // Regras Demográficas
                    if (idStr === "597118511") valor = "Masculino";
                    else if (idStr === "1551581666") valor = findMatchingOption(e.alternativas, currentPersona.idade);
                    else if (idStr === "838409150") valor = findMatchingOption(e.alternativas, currentPersona.escolaridade);
                    else if (idStr === "1238416916") valor = findMatchingOption(e.alternativas, currentPersona.experiencia);
                    else if (idStr === "1526877193") valor = findMatchingOption(e.alternativas, currentPersona.tamanho_organizacao);
                    else if (idStr === "1608516216") valor = findMatchingOption(e.alternativas, currentPersona.vinculo);
                    else if (idStr === "542331173") valor = findMatchingOption(e.alternativas, currentPersona.experiencia);
                    else if (idStr === "1689161648") valor = "Aceito participar";
                    else {
                        const total = e.alternativas.length;
                        let targetMean = sentimentMap.base;
                        let weight = 1.0;

                        // Verifica se pertence a um cluster
                        for (let clusterName in CLUSTERS) {
                            if (CLUSTERS[clusterName].ids.includes(idStr)) {
                                targetMean = clusterSentiments[clusterName];
                                weight = CLUSTERS[clusterName].weight;
                                break;
                            }
                        }

                        // Aplica inversão se o peso for negativo
                        if (weight < 0) {
                            // Inverte a média: se era 4.5 (em 5), vira 1.5
                            targetMean = (total + 1) - targetMean;
                        }

                        // Inversão para perguntas negativas específicas (R)
                        if (REVERSE_CODED.includes(idStr)) {
                            targetMean = (total + 1) - targetMean;
                        }

                        // Cálculo do índice com Normal Distribution
                        let relMean = (targetMean - 1) / (total - 1);
                        let norm = gauss() * (sentimentMap.std / total);
                        let rawIndex = (relMean * (total - 1)) + (norm * (total - 1));
                        
                        let index = Math.round(rawIndex);
                        index = Math.max(0, Math.min(total - 1, index));
                        valor = e.alternativas[index];
                    }
                    chosenData[`entry.${idStr}`] = valor;
                    updateUI(idStr, valor);
                });
            });
            document.getElementById('btn-review').disabled = false;
        }

        function gauss() {
            let u = 0, v = 0;
            while(u === 0) u = Math.random();
            while(v === 0) v = Math.random();
            return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
        }

        function manualmenteSetarResposta(entryId, valor) {
            chosenData[`entry.${entryId}`] = valor;
            updateUI(entryId, valor);
            document.getElementById('btn-review').disabled = false;
        }

        function findMatchingOption(options, target) {
            if (!target) return options[0];
            const nt = normalizeText(target);
            const keywords = nt.split(/[\s/|-]+/).filter(w => w.length > 2);
            let best = null, maxH = -1;
            options.forEach(opt => {
                const no = normalizeText(opt);
                let h = 0;
                keywords.forEach(k => { if (no.includes(k)) h++; });
                if (h > maxH) { maxH = h; best = opt; }
            });
            return (maxH > 0) ? best : options[0];
        }

        function updateUI(entryId, valor) {
            document.querySelectorAll(`.option-tag[data-id="${entryId}"]`).forEach(tag => {
                if (tag.textContent === valor) {
                    tag.style.background = 'var(--accent)';
                    tag.style.fontWeight = '700';
                    tag.style.opacity = '1';
                } else {
                    tag.style.background = 'var(--border)';
                    tag.style.fontWeight = '400';
                    tag.style.opacity = '0.3';
                }
            });
        }

        function revisarNoGoogle() {
            const baseUrl = "https://docs.google.com/forms/d/e/1FAIpQLSe4Nud-H974E-T2vSCqERbqHzWx96Jyz-JbiJPNvmYCFm4UAQ/viewform";
            const params = new URLSearchParams();
            for (let key in chosenData) params.append(key, chosenData[key]);
            window.open(`${baseUrl}?${params.toString()}`, '_blank');
        }

        function showLoading(text) { document.getElementById('loading-text').textContent = text; document.getElementById('loading-overlay').style.display = 'flex'; }
        function hideLoading() { document.getElementById('loading-overlay').style.display = 'none'; }
        function saveSettings() { localStorage.setItem('fmp_worker_url', document.getElementById('worker-url').value); }
        function loadSettings() { document.getElementById('worker-url').value = localStorage.getItem('fmp_worker_url') || 'googleformsrespode.lucasmaia2709.workers.dev'; }

        loadFormData();
    </script>
</body>
</html>
